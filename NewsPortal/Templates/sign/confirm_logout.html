{% extends 'flatpages/default.html' %}

{% block title %}
Подтверждение выхода
{% endblock title %}


{% block content %}
<div class="container m-5">
    <h4>Вы действительно хотите выйти из системы?</h4>
    <form action="{% url 'logout' %}" method="post" class="filter-form">
        {% csrf_token %}
        <input type="submit" value="Выйти" class="btn btn-outline-danger mt-2">
    </form>
</div>
{% endblock content %}
