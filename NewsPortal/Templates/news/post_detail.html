{% extends 'flatpages/default.html' %}
{% load news_filters %}

{% block title %}
Публикация № {{ post.id }}
{% endblock title %}


{% block content %}
<p style="text-align: right;">{{ post.post_date|date:'d.M.Y' }}</p>
<div class="container m-5">
    <p><p style="text-align: center;"><em><strong>{{ post.post_header|censor }}</strong></em></p>
    <p>{{ post.post_content|censor }}</p>
</div>
{% endblock content %}
